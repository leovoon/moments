<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Moments - Family Videos</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <h1>Moments</h1>
    <nav class="header-nav">
      <a href="/upload">Upload</a>
      <a href="#" onclick="logout()">Logout</a>
    </nav>
  </header>

  <div class="video-feed" id="video-feed">
    <!-- Videos will be loaded here -->
  </div>

  <div class="scroll-hint" id="scroll-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M19 12l-7 7-7-7"/>
    </svg>
  </div>

  <script>
    const feed = document.getElementById('video-feed');
    const scrollHint = document.getElementById('scroll-hint');
    let videos = [];
    let currentVideoIndex = 0;

    // Load videos on page load
    async function loadVideos() {
      try {
        const response = await fetch('/api/videos');
        if (response.status === 401) {
          window.location.href = '/login';
          return;
        }
        
        videos = await response.json();
        
        if (videos.length === 0) {
          showEmptyState();
          return;
        }
        
        renderVideos();
        setupAutoPlay();
      } catch (error) {
        console.error('Failed to load videos:', error);
        showError('Failed to load videos. Please try again.');
      }
    }

    function showEmptyState() {
      feed.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <h2>No videos yet</h2>
          <p>Upload your first family moment!</p>
          <a href="/upload" class="btn btn-primary" style="text-decoration:none; max-width:200px;">Upload Video</a>
        </div>
      `;
    }

    function showError(message) {
      feed.innerHTML = `
        <div class="empty-state">
          <h2>Error</h2>
          <p>${message}</p>
        </div>
      `;
    }

    function renderVideos() {
      feed.innerHTML = videos.map((video, index) => `
        <div class="video-item" data-index="${index}">
          <video 
            src="/videos/${video.id}" 
            playsinline 
            loop
            preload="metadata"
            poster=""
          ></video>
          
          <div class="video-info">
            <div class="username">@${video.username}</div>
            ${video.title ? `<div class="title">${escapeHtml(video.title)}</div>` : ''}
            ${video.description ? `<div class="description">${escapeHtml(video.description)}</div>` : ''}
            <div class="date">${formatDate(video.created_at)}</div>
          </div>
          
          <div class="video-actions">
            <button onclick="togglePlay(${index})" title="Play/Pause">
              <svg viewBox="0 0 24 24" fill="white" width="20" height="20" class="play-icon">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <button onclick="deleteVideo(${video.id}, ${index})" title="Delete">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="20" height="20">
                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    function setupAutoPlay() {
      const videoElements = document.querySelectorAll('video');
      
      // Pause all videos first
      videoElements.forEach(video => video.pause());
      
      // Intersection Observer for auto-play
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target;
          if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
            // Play visible video
            video.play().catch(() => {});
            video.muted = false;
            
            // Update current index
            const item = video.closest('.video-item');
            currentVideoIndex = parseInt(item.dataset.index);
            
            // Hide scroll hint after first video
            if (currentVideoIndex === 0) {
              scrollHint.style.display = 'none';
            }
          } else {
            // Pause hidden videos
            video.pause();
          }
        });
      }, { threshold: 0.5 });
      
      videoElements.forEach(video => observer.observe(video));
    }

    function togglePlay(index) {
      const video = document.querySelectorAll('video')[index];
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
    }

    async function deleteVideo(videoId, index) {
      if (!confirm('Are you sure you want to delete this video?')) {
        return;
      }
      
      try {
        const response = await fetch(`/api/videos/${videoId}`, {
          method: 'DELETE'
        });
        
        if (response.ok) {
          videos.splice(index, 1);
          if (videos.length === 0) {
            showEmptyState();
          } else {
            renderVideos();
            setupAutoPlay();
          }
        } else {
          alert('Failed to delete video');
        }
      } catch (error) {
        console.error('Delete error:', error);
        alert('Failed to delete video');
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;
      
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      
      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      
      return date.toLocaleDateString();
    }

    // Initialize
    loadVideos();
  </script>
</body>
</html>
