<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Moments - Family Videos</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <h1>Moments</h1>
    <nav class="header-nav">
      <a href="/upload">Upload</a>
      <a href="#" onclick="logout()">Logout</a>
    </nav>
  </header>

  <div class="video-feed" id="video-feed">
    <!-- Videos will be loaded here -->
  </div>

  <div class="scroll-hint" id="scroll-hint">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 5v14M19 12l-7 7-7-7"/>
    </svg>
  </div>

  <script>
    const feed = document.getElementById('video-feed');
    const scrollHint = document.getElementById('scroll-hint');
    let videos = [];
    let currentVideoIndex = 0;

    // Load videos on page load
    async function loadVideos() {
      try {
        const response = await fetch('/api/videos');
        if (response.status === 401) {
          window.location.href = '/login';
          return;
        }
        
        videos = await response.json();
        
        if (videos.length === 0) {
          showEmptyState();
          return;
        }
        
        renderVideos();
        setupAutoPlay();
      } catch (error) {
        console.error('Failed to load videos:', error);
        showError('Failed to load videos. Please try again.');
      }
    }

    function showEmptyState() {
      feed.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
          </svg>
          <h2>No videos yet</h2>
          <p>Upload your first family moment!</p>
          <a href="/upload" class="btn btn-primary" style="text-decoration:none; max-width:200px;">Upload Video</a>
        </div>
      `;
    }

    function showError(message) {
      feed.innerHTML = `
        <div class="empty-state">
          <h2>Error</h2>
          <p>${message}</p>
        </div>
      `;
    }

    function renderVideos() {
      feed.innerHTML = videos.map((video, index) => `
        <div class="video-item" data-index="${index}">
          <video 
            src="/videos/${video.id}" 
            ${video.thumbnail ? `poster="/thumbnails/${video.id}.jpg"` : ''}
            playsinline 
            loop
            preload="metadata"
            onclick="togglePlay(${index})"
          ></video>
          
          <div class="video-info">
            <div class="username">@${video.username}</div>
            ${video.title ? `<div class="title">${escapeHtml(video.title)}</div>` : ''} 
            ${video.description ? `<div class="description">${escapeHtml(video.description)}</div>` : ''}
            <div class="date">${formatDate(video.created_at)}</div>
          </div>
          
          <div class="video-actions">
            <button onclick="togglePlay(${index})" title="Play/Pause" class="play-btn">
              <svg viewBox="0 0 24 24" fill="white" width="20" height="20" class="icon-pause" style="display:none">
                <path d="M6 4h4v16H6zM14 4h4v16h-4z"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="white" width="20" height="20" class="icon-play">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <button onclick="startDelete(${video.id}, ${index})" title="Delete" class="delete-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" width="20" height="20">
                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </div>

          <div class="delete-confirm" id="delete-confirm-${video.id}" style="display:none">
            <p>Delete this video?</p>
            <input type="password" id="delete-pin-${video.id}" class="delete-pin" placeholder="Enter passcode" inputmode="numeric" maxlength="4">
            <p class="delete-pin-error" id="delete-pin-error-${video.id}" style="display:none">Wrong passcode</p>
            <div class="delete-confirm-actions">
              <button onclick="confirmDelete(${video.id}, ${index})" class="btn-delete-yes">Delete</button>
              <button onclick="cancelDelete(${video.id})" class="btn-delete-no">Cancel</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function setupAutoPlay() {
      const videoElements = document.querySelectorAll('video');
      
      // Pause all videos first
      videoElements.forEach(video => video.pause());
      
      // Intersection Observer for auto-play
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const video = entry.target;
          const item = video.closest('.video-item');
          const playBtn = item.querySelector('.play-btn');
          const iconPlay = playBtn.querySelector('.icon-play');
          const iconPause = playBtn.querySelector('.icon-pause');

          if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
            video.play().catch(() => {});
            video.muted = false;
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
            
            currentVideoIndex = parseInt(item.dataset.index);
            
            if (currentVideoIndex === 0) {
              scrollHint.style.display = 'none';
            }
          } else {
            video.pause();
            iconPlay.style.display = 'block';
            iconPause.style.display = 'none';
          }
        });
      }, { threshold: 0.5 });
      
      videoElements.forEach(video => observer.observe(video));
    }

    function togglePlay(index) {
      const video = document.querySelectorAll('video')[index];
      const item = video.closest('.video-item');
      const playBtn = item.querySelector('.play-btn');
      const iconPlay = playBtn.querySelector('.icon-play');
      const iconPause = playBtn.querySelector('.icon-pause');

      if (video.paused) {
        video.play();
        iconPlay.style.display = 'none';
        iconPause.style.display = 'block';
      } else {
        video.pause();
        iconPlay.style.display = 'block';
        iconPause.style.display = 'none';
      }
    }

    function startDelete(videoId, index) {
      document.getElementById(`delete-confirm-${videoId}`).style.display = 'flex';
      document.getElementById(`delete-pin-error-${videoId}`).style.display = 'none';
      const pinInput = document.getElementById(`delete-pin-${videoId}`);
      pinInput.value = '';
      setTimeout(() => pinInput.focus(), 100);
    }

    function cancelDelete(videoId) {
      document.getElementById(`delete-confirm-${videoId}`).style.display = 'none';
    }

    async function confirmDelete(videoId, index) {
      const pin = document.getElementById(`delete-pin-${videoId}`).value;
      if (pin !== '0909') {
        document.getElementById(`delete-pin-error-${videoId}`).style.display = 'block';
        return;
      }
      
      try {
        const response = await fetch(`/api/videos/${videoId}`, {
          method: 'DELETE'
        });
        
        if (response.ok) {
          videos.splice(index, 1);
          if (videos.length === 0) {
            showEmptyState();
          } else {
            renderVideos();
            setupAutoPlay();
          }
        } else {
          alert('Failed to delete video');
        }
      } catch (error) {
        console.error('Delete error:', error);
        alert('Failed to delete video');
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;
      
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      
      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      
      return date.toLocaleDateString();
    }

    // Initialize
    loadVideos();
  </script>
</body>
</html>
